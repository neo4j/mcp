name: Docker Release Alpha
description: This workflow is not to be ran on the main branch

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release name (e.g. v1.2.3)"
        required: true
        type: string

env:
  DOCKER_REPOSITORY: neo4j/mcp

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to DockerHub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_KEY }}

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_REPOSITORY }}:${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
