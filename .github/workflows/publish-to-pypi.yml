name: Publish to PyPI
on:
  release:
    types: [published]
  push:
    branches:
      - "keremgocen/publish-pypi-package-mcp-server"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.2.0, without v prefix)"
        required: true
      upload:
        description: "Publish to PyPI?"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Get version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=0.0.0-test" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi
      - run: pip install go-to-wheel
      - run: |
          go-to-wheel . \
            --name neo4j-mcp \
            --version ${{ env.VERSION }} \
            --description "Neo4j MCP server" \
            --license GPL-3.0-only \
            --url https://github.com/neo4j/mcp \
            --readme README.md
      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/
      - name: Publish to TestPyPI
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
      - name: Publish to PyPI
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
