name: Docker Release

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["GoReleaser Release"]
    types: [completed]
    branches: [main]

permissions: {}

env:
  DOCKER_REPOSITORY: neo4j/mcp

jobs:
  get-version:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.latest.outputs.output }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Get the latest version
        id: latest
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2
        with:
          version: latest
          args: latest

  build-and-push-docker:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_KEY }}

      - name: Build and push ${{ matrix.arch }} image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ env.DOCKER_REPOSITORY }}:${{ matrix.arch }}-${{ needs.get-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifests:
    needs: [get-version, build-and-push-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_KEY }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          docker buildx imagetools create \
            -t ${{ env.DOCKER_REPOSITORY }}:${VERSION} \
            -t ${{ env.DOCKER_REPOSITORY }}:latest \
            ${{ env.DOCKER_REPOSITORY }}:amd64-${VERSION} \
            ${{ env.DOCKER_REPOSITORY }}:arm64-${VERSION}
