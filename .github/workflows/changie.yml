name: changie

on:
  push:
    branches: ["main"]
    paths:
      - ".changes/unreleased/**"

jobs:
  generate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for unbatched changes
        id: check_changes
        run: |
          COUNT=$(find .changes/unreleased -name "*.yaml" | wc -l)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Batch changes
        if: steps.check_changes.outputs.count > 0
        id: batch
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2
        with:
          version: latest
          args: batch auto

      - name: No changes to release
        if: steps.check_changes.outputs.count == 0
        run: echo "No new change files found. Skipping batch step."

      - name: Merge changes
        if: steps.batch.outcome == 'success'
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2
        with:
          version: latest
          args: merge

      - name: Get the latest version
        id: latest
        if: steps.batch.outcome == 'success'
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2
        with:
          version: latest
          args: latest

      - name: Create Pull Request
        if: steps.batch.outcome == 'success'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          title: Release ${{ steps.latest.outputs.output }}
          branch: release/${{ steps.latest.outputs.output }}
          body-path: .changes/${{ steps.latest.outputs.output }}.md
          commit-message: Release ${{ steps.latest.outputs.output }}
          token: ${{ env.TOKEN }}
        env:
          TOKEN: ${{ secrets.TEAM_GRAPHQL_PERSONAL_ACCESS_TOKEN }}
